## ~/.config/hypr/hyprpaper.conf

preload = ~/Pictures/wallpapers/fondo.jpg

# En hyprpaper 0.8+ el wildcard "," para todos los monitores ya no
# funciona — hay que usar el nombre real del monitor (confirmado: eDP-1).
# Si en el futuro conectas otro monitor, mira su nombre con:
#   hyprctl monitors
# y agrega una línea "wallpaper = NOMBRE, ruta" por cada uno.
wallpaper = eDP-1, ~/Pictures/wallpapers/fondo.jpg

ipc = on

