## ~/.config/hypr/hyprlock.conf

background {
    monitor =
    color = rgba(15, 15, 20, 1.0)   # fondo simple, sin depender de captura de pantalla
    blur_passes = 0
}

input-field {
    monitor =
    size = 280, 60
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = rgba(89b4faff)
    inner_color = rgba(30, 30, 46, 0.85)
    font_color = rgba(205, 214, 244, 1)
    fade_on_empty = true
    placeholder_text = <i>Contraseña...</i>
    hide_input = false
    position = 0, -40
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(205, 214, 244, 1)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d de %B")"
    color = rgba(166, 173, 200, 1)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 60
    halign = center
    valign = center
}
