## ~/.config/hypr/hyprland.conf
## Config base de Hyprland — pensada para alguien que viene de i3
## Comentarios en español para que sea fácil de modificar

#####################
### MONITORES
#####################
# Detecta automáticamente. Si tienes varios monitores, ajusta aquí.
# Ejemplo manual: monitor=DP-1,1920x1080@60,0x0,1
monitor=,preferred,auto,1


#####################
### PROGRAMAS POR DEFECTO
#####################
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun


#####################
### AUTOSTART
#####################
exec-once = waybar
exec-once = hyprpaper
exec-once = dunst
exec-once = nm-applet --indicator
exec-once = hypridle
# Descomenta la siguiente línea si prefieres seguir usando KWallet
# (contraseñas guardadas de wifi, navegador, etc.) en vez de nmcli:
# exec-once = /usr/lib/kwalletd6


#####################
### VARIABLES DE ENTORNO
#####################
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct


#####################
### APARIENCIA GENERAL
#####################
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(89b4faee) rgba(cba6f7ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 8

    blur {
        enabled = true
        size = 4
        passes = 2
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
    }
}

animations {
    enabled = true

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1

    animation = windows, 1, 4, easeOutQuint
    animation = windowsOut, 1, 4, easeInOutCubic, popin 80%
    animation = fade, 1, 3, easeOutQuint
    animation = workspaces, 1, 5, easeInOutCubic
}

dwindle {
    preserve_split = true
    smart_split = true   # arregla movewindow l/r, que sin esto puede no encontrar vecino
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}


#####################
### INPUT
#####################
input {
    kb_layout = us
    kb_variant = dvorak
    follow_mouse = 1
    sensitivity = 0
    natural_scroll = true   # invierte el scroll de la rueda del mouse (antes no estaba seteado = dirección normal)
    touchpad {
        natural_scroll = false   # invertido respecto al valor anterior (era true)
    }
}

gestures {
    # workspace_swipe fue eliminado desde Hyprland 0.51.
    # Sintaxis nueva: gesture = dedos, dirección, acción
    gesture = 3, horizontal, workspace
}


#####################
### TECLA MOD
#####################
$mainMod = SUPER


#####################
### ATAJOS DE TECLADO (estilo i3)
#####################
# IMPORTANTE: todos los atajos que usan letras están bindeados por
# "code:" (código físico de tecla), NO por el carácter que produce el
# layout. Así, sin importar si tienes activo Dvorak, QWERTY o cualquier
# otro layout, el atajo SIEMPRE está en la misma posición física del
# teclado (la posición que tendría esa letra en un QWERTY estándar).
#
# OJO: Hyprland usa el numerado de KEYCODES X11, que es igual al evdev
# + 8 (offset fijo). La tabla de abajo ya tiene el +8 aplicado.
#
# Tabla de referencia (posición física QWERTY -> keycode X11):
#   Q=24  W=25  E=26  R=27  T=28  Y=29  U=30  I=31  O=32  P=33
#   A=38  S=39  D=40  F=41  G=42  H=43  J=44  K=45  L=46
#   Z=52  X=53  C=54  V=55  B=56  N=57  M=58

# Aplicaciones
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, code:24, killactive,        # posición física de Q
bind = $mainMod, code:26, exec, $fileManager # posición física de E
bind = $mainMod, code:40, exec, $menu        # posición física de D
bind = $mainMod SHIFT, code:26, exit,        # posición física de E
bind = $mainMod, code:55, togglefloating,    # posición física de V
bind = $mainMod, code:41, fullscreen,        # posición física de F
bind = $mainMod, code:33, pseudo,            # posición física de P
bind = $mainMod, code:39, layoutmsg, togglesplit  # posición física de S (vía layoutmsg desde Hyprland 0.54+)

# Captura de pantalla
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# Mover el foco (flechas, recomendado, o vim-like hjkl por posición física)
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, code:43, movefocus, l   # posición física de H
bind = $mainMod, code:46, movefocus, r   # posición física de L
bind = $mainMod, code:45, movefocus, u   # posición física de K
bind = $mainMod, code:44, movefocus, d   # posición física de J

# Mover ventanas
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d
bind = $mainMod SHIFT, code:43, movewindow, l   # posición física de H
bind = $mainMod SHIFT, code:46, movewindow, r   # posición física de L
bind = $mainMod SHIFT, code:45, movewindow, u   # posición física de K
bind = $mainMod SHIFT, code:44, movewindow, d   # posición física de J

# Workspaces (1-10, como en i3)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mover ventana activa a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


#####################
### ASIGNACIÓN DE WORKSPACES POR APP
#####################
# Cuando abres una de estas apps, salta sola al workspace que le toca.
# Esquema usado (debe coincidir con los iconos en waybar-config.jsonc):
#   1 🌐 Web        2 💻 Terminal/código   3 📝 Notas       4 📁 Archivos
#   5 💬 Chat        6 🎵 Música            7 🎮 Juegos      8 🖌️ Diseño
#   9 ⚙️ Sistema     10 📌 Varios
#
# Para agregar más reglas: abre la app, corre "hyprctl clients" en
# otra terminal, busca el campo "class:" de esa ventana, y agrega
# una línea nueva con ese nombre exacto.
#
# OJO sintaxis (Hyprland 0.53+): primero "match:class <regex>",
# DESPUÉS la regla. Es al revés que en versiones viejas.
windowrule = match:class ^(firefox)$, workspace 1 silent
windowrule = match:class ^(Joplin)$, workspace 3 silent
windowrule = match:class ^(thunar)$, workspace 4 silent

# Scroll entre workspaces con la rueda del mouse + mod
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mover/redimensionar ventanas flotantes con el mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Control de volumen y brillo (teclas multimedia)
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Bloquear pantalla
bind = $mainMod, Escape, exec, hyprlock

# Menú de apagado/cierre de sesión (wlogout)
bind = $mainMod SHIFT, Escape, exec, wlogout
