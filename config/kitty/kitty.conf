## ~/.config/kitty/kitty.conf

# Evita el popup "¿cerrar esta ventana?" cuando hay un proceso
# (como btop) corriendo en primer plano.
confirm_os_window_close 0

font_family JetBrainsMono Nerd Font
font_size 11.0
background_opacity 0.92

#####################
### COLORES — estilo "techy" (verde neón sobre negro)
#####################
foreground            #00ff9c
background            #0a0e0a
cursor                 #00ff9c
cursor_text_color      #0a0e0a

# Color de selección — antes salía amarillo por defecto, ahora cian neón
selection_foreground   #0a0e0a
selection_background   #00e5ff

# Paleta de 16 colores
color0  #0a0e0a
color1  #ff3b6b
color2  #00ff9c
color3  #f5e642
color4  #00b8ff
color5  #d633ff
color6  #00e5ff
color7  #c8d6c8

color8  #4d5d4d
color9  #ff6b8f
color10 #5dffba
color11 #ffe96b
color12 #6bc8ff
color13 #e066ff
color14 #6bf0ff
color15 #e8f5e8

# Bordes de ventana activa/inactiva (cuando hay varias)
active_border_color   #00ff9c
inactive_border_color #2a3a2a
